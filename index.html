<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.0/dist/aframe.min.js"></script>

    <!-- MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body, html {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind;"
             color-space="sRGB"
             renderer="colorManagement: true, physicallyCorrectLights"
             vr-mode-ui="enabled: false"
             device-orientation-permission-ui="enabled: false">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- When the image is detected, this model appears -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model src="./assets/arabic.glb"
                      position="0 0 0"
                      scale="0.5 0.5 0.5"
                      rotation="0 0 0">
        </a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
