<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Art2 AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.0/dist/aframe.min.js"></script>

    <!-- MindAR (Image Tracking + A-Frame Integration) -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
    </style>
  </head>

  <body>
    <!-- Debug text -->
    <p style="color:white; position:fixed; top:10px; left:10px; z-index:9999; font-family:sans-serif;">
      Loading AR...
    </p>

    <a-scene
      mindar-image="imageTargetSrc: ./assets/targets.mind;"
      embedded
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: true"
      >
      
      <!-- Required camera -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- AR target -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model
          src="./assets/arabic.glb"
          position="0 0 0"
          scale="0.5 0.5 0.5"
          rotation="0 0 0">
        </a-gltf-model>
      </a-entity>

    </a-scene>
  </body>
</html>
